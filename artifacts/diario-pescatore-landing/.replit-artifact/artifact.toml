kind = "web"
previewPath = "/diario-pescatore-landing/"
title = "Diario del Pescatore — Installa l'app"
version = "1.0.0"
id = "artifacts/diario-pescatore-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/diario-pescatore-landing/" ]
localPort = 23550

[services.development]
run = "pnpm --filter @workspace/diario-pescatore-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diario-pescatore-landing", "run", "build" ]
publicDir = "artifacts/diario-pescatore-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23550"
BASE_PATH = "/diario-pescatore-landing/"
