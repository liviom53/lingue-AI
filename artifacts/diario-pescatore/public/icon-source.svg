<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- Gradient circle -->
  <rect x="64" y="64" width="384" height="384" rx="80" fill="url(#bg)"/>

  <!-- Fishing rod — diagonal line -->
  <line x1="145" y1="140" x2="340" y2="200" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Rod tip vertical line (fishing line) -->
  <line x1="340" y1="200" x2="340" y2="310" stroke="white" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 1"/>

  <!-- Hook -->
  <path d="M340 310 Q340 380 290 380 Q240 380 240 330" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Hook tip -->
  <path d="M240 330 L255 350" stroke="white" stroke-width="16" stroke-linecap="round"/>

  <!-- Reel circle -->
  <circle cx="200" cy="178" r="28" fill="white" opacity="0.9"/>
  <circle cx="200" cy="178" r="16" fill="url(#bg)"/>

  <!-- Fish (small) -->
  <ellipse cx="295" cy="390" rx="28" ry="16" fill="white" opacity="0.85" transform="rotate(-20 295 390)"/>
  <path d="M320 378 L338 365 L338 390 Z" fill="white" opacity="0.85" transform="rotate(-20 295 390)"/>
</svg>
