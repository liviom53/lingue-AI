kind = "web"
previewPath = "/"
title = "Diario del Pescatore"
version = "1.0.0"
id = "artifacts/diario-pescatore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 22883

[services.development]
run = "pnpm --filter @workspace/diario-pescatore run dev"

[services.env]
PORT = "22883"
BASE_PATH = "/"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/diario-pescatore", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/diario-pescatore", "run", "serve"]

[services.production.run.env]
PORT = "22883"
NODE_ENV = "production"
