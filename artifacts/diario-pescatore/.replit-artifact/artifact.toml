kind = "web"
  previewPath = "/"
  title = "Diario del Pescatore"
  version = "1.0.0"
  id = "artifacts/diario-pescatore"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = ["/"]
  localPort = 22883

  [services.development]
  run = "pnpm --filter @workspace/diario-pescatore run dev"

  [services.env]
  PORT = "22883"
  BASE_PATH = "/"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/diario-pescatore", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  BASE_PATH = "/"

  [services.production.run]
  args = ["node", "artifacts/diario-pescatore/serve-prod.mjs"]

  [services.production.run.env]
  PORT = "22883"

  [services.production.health.startup]
  path = "/"
  