kind = "web"
  previewPath = "/"
  title = "Diario del Pescatore"
  version = "1.0.0"
  id = "artifacts/diario-pescatore"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  localPort = 22883
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/diario-pescatore run dev"

  [services.env]
  PORT = "22883"
  BASE_PATH = "/"

  [services.production]

  [services.production.build]
  args = ["sh", "-c", "NODE_ENV=production BASE_PATH=/ pnpm --filter @workspace/diario-pescatore run build"]

  [services.production.run]
  args = ["node", "artifacts/diario-pescatore/serve.mjs"]

  [services.production.run.env]
  PORT = "22883"
  NODE_ENV = "production"

  [services.production.health.startup]
  path = "/"
  