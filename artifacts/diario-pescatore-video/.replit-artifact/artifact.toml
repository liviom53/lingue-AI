kind = "video"
previewPath = "/diario-pescatore-video/"
title = "Diario del Pescatore — Video Tutorial"
version = "1.0.0"
id = "artifacts/diario-pescatore-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/diario-pescatore-video/" ]
localPort = 23199

[services.development]
run = "pnpm --filter @workspace/diario-pescatore-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diario-pescatore-video", "run", "build" ]
publicDir = "artifacts/diario-pescatore-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23199"
BASE_PATH = "/diario-pescatore-video/"
