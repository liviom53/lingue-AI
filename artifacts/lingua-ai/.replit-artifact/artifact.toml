kind = "web"
  previewPath = "/lingua-ai/"
  title = "Lingua AI Pro"
  version = "1.0.0"
  id = "artifacts/lingua-ai"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  localPort = 19529
  paths = ["/lingua-ai/"]

  [services.development]
  run = "pnpm --filter @workspace/lingua-ai run dev"

  [services.env]
  PORT = "19529"
  BASE_PATH = "/lingua-ai/"

  [services.production]

  [services.production.build]
  args = ["sh", "-c", "NODE_ENV=production BASE_PATH=/lingua-ai/ pnpm --filter @workspace/lingua-ai run build"]

  [services.production.run]
  args = ["node", "artifacts/lingua-ai/serve.mjs"]

  [services.production.run.env]
  PORT = "19529"
  NODE_ENV = "production"
  BASE_PATH = "/lingua-ai/"

  [services.production.health.startup]
  path = "/lingua-ai/"
  